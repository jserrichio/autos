services:
  backend:
    build: ./backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    volumes:
      - ./backend/data:/app/data
      - ./backend/uploads:/app/uploads
    expose:
      - "8000"

  web:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-8091}:80"
    depends_on:
      - backend
